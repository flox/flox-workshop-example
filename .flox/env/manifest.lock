{
  "lockfile-version": 1,
  "manifest": {
    "version": 1,
    "install": {
      "go": {
        "pkg-path": "go",
        "version": "^1.23.4"
      },
      "gum": {
        "pkg-path": "gum"
      },
      "httpie": {
        "pkg-path": "httpie"
      },
      "redis": {
        "pkg-path": "redis"
      }
    },
    "vars": {
      "REDISBIND": "127.0.0.1",
      "REDISPORT": "6379"
    },
    "hook": {
      "on-activate": "\n# XXX: https://github.com/flox/flox/issues/1341\nunset LD_AUDIT\n\nexport REDISHOME=\"$FLOX_ENV_CACHE/redis\"\nexport REDISDATA=\"$REDISHOME/data\"\nexport REDISCONFIG=\"$REDISHOME/redis.conf\"\n\nif [ ! -d \"$REDISDATA\" ]; then\n  mkdir -p \"$REDISDATA\"\nfi\n\ncat >$REDISCONFIG <<EOF\nbind $REDISBIND\nport $REDISPORT\nEOF\n\n\n  # Autogenerated by Flox\n\n  # Point GOENV to Flox environment cache\n  export GOENV=\"$FLOX_ENV_CACHE/goenv\"\n\n  # Install Go dependencies\n  go get .\n\n  # End autogenerated by Flox\n"
    },
    "profile": {
      "common": "echo \"\"\necho \"     ╔═════════════════════════════════════╗\"\necho \"     ║                                     ║\"\necho \"     ║  Start Redis in the background:     ║\"\necho \"     ║  👉 flox services start             ║\"\necho \"     ║  👉 flox activate --start-services  ║\"\necho \"     ║                                     ║\"\necho \"     ║  Try to connect to Redis:           ║\"\necho \"     ║  👉redis-cli -p \\$REDISPORT ping     ║\"\necho \"     ║                                     ║\"\necho \"     ╚═════════════════════════════════════╝\"\necho \"\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    },
    "services": {
      "app": {
        "command": "go run main.go"
      },
      "redis": {
        "command": "redis-server \"$REDISCONFIG\" \\\n  --daemonize no \\\n  --dir \"$REDISDATA\"\n"
      }
    },
    "build": {
      "quotes": {
        "command": "mkdir -p $out/{lib,bin}\ncp -pr quotes.json $out/lib\ngo mod tidy\ngo build -trimpath -o $out/bin/quotes-app-go main.go\nchmod +x $out/bin/quotes-app-go\n",
        "version": "0.0.1",
        "description": "The quotes app"
      }
    }
  },
